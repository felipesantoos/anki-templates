<div class="back-header">
  {{#Subject}}<div class="subject">{{Subject}}</div>{{/Subject}}
  {{#Keywords}}<div class="keywords">{{Keywords}}</div>{{/Keywords}}
</div>

<hr id="answer">

<div class="mindmap-scroll">
  <div class="mindmap" id="mindmap-root" data-title="{{text:Title}}">{{Mindmap}}</div>
</div>

<script>
(function() {
  // ===== Phase 1: Cleanup =====
  function cleanupAnkiHtml(rawHtml) {
    return rawHtml
      .replace(/<\/div>\s*<div[^>]*>/gi, "\n")
      .replace(/<div[^>]*>/gi, "\n")
      .replace(/<\/div>/gi, "")
      .replace(/<br\s*\/?>/gi, "\n")
      .replace(/<[^>]+>/g, "")
      .replace(/&lt;/g, "<")
      .replace(/&gt;/g, ">")
      .replace(/&nbsp;/g, " ")
      .replace(/&amp;/g, "&");
  }

  // ===== Phase 1b: Inline formatter =====
  function inline(t) {
    t = t.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    var codes = [];
    t = t.replace(/`([^`]+)`/g, function(_, c) {
      codes.push("<code>" + c + "</code>");
      return "\u0000C" + (codes.length - 1) + "\u0000";
    });
    t = t
      .replace(/!\[([^\]]*)\]\(((?:[^()]|\([^)]*\))+)\)/g, '<img src="$2" alt="$1">')
      .replace(/\[([^\]]+)\]\(((?:[^()]|\([^)]*\))+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
      .replace(/\*\*\*(?=\S)(.+?)(?<=\S)\*\*\*/g, "<strong><em>$1</em></strong>")
      .replace(/\*\*(?=\S)(.+?)(?<=\S)\*\*/g, "<strong>$1</strong>")
      .replace(/\*(?=\S)(.+?)(?<=\S)\*/g, "<em>$1</em>")
      .replace(/~~(?=\S)(.+?)(?<=\S)~~/g, "<del>$1</del>");
    return t.replace(/\u0000C(\d+)\u0000/g, function(_, idx) {
      return codes[parseInt(idx, 10)];
    });
  }

  // ===== Phase 2: Parse =====
  function parseTree(text, rootLabel) {
    var root = { label: rootLabel, children: [], depth: 0 };
    var stack = [{ indent: -1, node: root }];
    var lines = text.split("\n");
    for (var i = 0; i < lines.length; i++) {
      var m = lines[i].match(/^(\s*)[-*]\s+(.*)$/);
      if (!m) continue;
      var label = m[2].trim();
      if (!label) continue;
      var indent = m[1].replace(/\t/g, "    ").length;
      var node = { label: label, children: [], depth: 0 };
      while (stack[stack.length - 1].indent >= indent) stack.pop();
      var parent = stack[stack.length - 1].node;
      node.depth = parent.depth + 1;
      parent.children.push(node);
      stack.push({ indent: indent, node: node });
    }
    return root;
  }

  // ===== Phase 3: Layout (single-pass, no DOM measurement) =====
  // Sizes are estimated via canvas.measureText() — pure JS, no reflow.
  // The max-width CSS cap bounds estimation error so nodes never overlap.
  var COLOR_SLOTS = 8;
  var COL_GAP = 24;
  var LEAF_GAP_PX = 10;
  var MIN_LEAF_SLOT_PX = 34;
  var CANVAS_PAD = 16;

  // Size estimation constants (must match CSS).
  var MAX_W = 200;
  var NODE_PAD_X = 20;    // 10px padding × 2
  var HUB_PAD_X = 28;     // 14px padding × 2
  var NODE_LINE_H = 17.5;  // 14px × 1.25 line-height
  var HUB_LINE_H = 21.25;  // 17px × 1.25 line-height
  var NODE_EXTRA_H = 10;   // 4+4 padding + 2 border
  var HUB_EXTRA_H = 14;    // 6+6 padding + 2 border
  var _ctx = document.createElement("canvas").getContext("2d");

  function estimateSize(node, isRoot) {
    var padX = isRoot ? HUB_PAD_X : NODE_PAD_X;
    var lineH = isRoot ? HUB_LINE_H : NODE_LINE_H;
    var extraH = isRoot ? HUB_EXTRA_H : NODE_EXTRA_H;
    _ctx.font = isRoot ? "bold 17px Georgia, serif" : "14px Georgia, serif";
    var textW = _ctx.measureText(node.label).width;
    var innerMax = MAX_W - padX;
    if (textW <= innerMax) {
      node.width = textW + padX;
      node.height = lineH + extraH;
    } else {
      node.width = MAX_W;
      node.height = Math.ceil(textW / innerMax) * lineH + extraH;
    }
  }

  function propagateBranch(node, branchIndex) {
    node.branchIndex = branchIndex;
    for (var i = 0; i < node.children.length; i++) {
      propagateBranch(node.children[i], branchIndex);
    }
  }

  function walkAll(node, cb) {
    cb(node);
    for (var i = 0; i < node.children.length; i++) walkAll(node.children[i], cb);
  }

  function assignBranches(root) {
    root.branchIndex = -1;
    for (var i = 0; i < root.children.length; i++) {
      propagateBranch(root.children[i], i % COLOR_SLOTS);
    }
  }

  // Adaptive x from widest node per depth column.
  function assignX(root) {
    var maxW = {};
    var maxDepth = 0;
    walkAll(root, function(n) {
      if (maxW[n.depth] === undefined || n.width > maxW[n.depth]) maxW[n.depth] = n.width;
      if (n.depth > maxDepth) maxDepth = n.depth;
    });
    var colX = {};
    var cursor = 0;
    for (var d = 0; d <= maxDepth; d++) {
      colX[d] = cursor;
      cursor += (maxW[d] || 0) + COL_GAP;
    }
    walkAll(root, function(n) { n.x = colX[n.depth]; });
  }

  function assignY(root) {
    function computeSlot(node) {
      if (node.children.length === 0) {
        var h = node.height + LEAF_GAP_PX;
        if (h < MIN_LEAF_SLOT_PX) h = MIN_LEAF_SLOT_PX;
        node.slotHeight = h;
        return h;
      }
      var sum = 0;
      for (var i = 0; i < node.children.length; i++) sum += computeSlot(node.children[i]);
      node.slotHeight = sum;
      return sum;
    }
    function placeY(node, topY) {
      node.y = topY + node.slotHeight / 2;
      var cursor = topY;
      for (var i = 0; i < node.children.length; i++) {
        placeY(node.children[i], cursor);
        cursor += node.children[i].slotHeight;
      }
    }
    computeSlot(root);
    placeY(root, 0);
  }

  function computeBounds(root) {
    var minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    walkAll(root, function(n) {
      if (n.x < minX) minX = n.x;
      if (n.x + n.width > maxX) maxX = n.x + n.width;
      var halfH = n.height / 2;
      if (n.y - halfH < minY) minY = n.y - halfH;
      if (n.y + halfH > maxY) maxY = n.y + halfH;
    });
    var dx = CANVAS_PAD - minX;
    var dy = CANVAS_PAD - minY;
    walkAll(root, function(n) { n.x += dx; n.y += dy; });
    root.canvasWidth = (maxX - minX) + CANVAS_PAD * 2;
    root.canvasHeight = (maxY - minY) + CANVAS_PAD * 2;
  }

  // ===== Phase 4: Render (single DOM insertion) =====
  var SVG_NS = "http://www.w3.org/2000/svg";

  function renderMindmap(root, container) {
    // All layout computed in pure JS — no DOM reads needed.
    assignBranches(root);
    walkAll(root, function(n) { estimateSize(n, n === root); });
    assignX(root);
    assignY(root);
    computeBounds(root);

    // Build everything in a DocumentFragment — one DOM insertion.
    var canvas = document.createElement("div");
    canvas.className = "mindmap-canvas";
    canvas.style.position = "relative";
    canvas.style.width = root.canvasWidth + "px";
    canvas.style.height = root.canvasHeight + "px";

    // SVG connectors (built first so they render behind nodes).
    var svg = document.createElementNS(SVG_NS, "svg");
    svg.setAttribute("class", "mindmap-edges");
    svg.setAttribute("width", root.canvasWidth);
    svg.setAttribute("height", root.canvasHeight);
    svg.style.position = "absolute";
    svg.style.left = "0";
    svg.style.top = "0";
    svg.style.pointerEvents = "none";

    function emitConnector(parent, child) {
      var sx = parent.x + parent.width;
      var sy = parent.y;
      var ex = child.x;
      var ey = child.y;
      var mx = (sx + ex) / 2;
      var path = document.createElementNS(SVG_NS, "path");
      path.setAttribute("d",
        "M " + sx + " " + sy +
        " C " + mx + " " + sy + ", " + mx + " " + ey + ", " + ex + " " + ey);
      path.setAttribute("stroke", "var(--branch-" + (child.branchIndex % COLOR_SLOTS) + ")");
      path.setAttribute("stroke-width", "2");
      path.setAttribute("stroke-linecap", "round");
      path.setAttribute("fill", "none");
      svg.appendChild(path);
    }
    function walkConnectors(node) {
      for (var i = 0; i < node.children.length; i++) {
        emitConnector(node, node.children[i]);
        walkConnectors(node.children[i]);
      }
    }
    walkConnectors(root);
    canvas.appendChild(svg);

    // Node divs at their final positions.
    walkAll(root, function(n) {
      var div = document.createElement("div");
      div.className = "mindmap-node" + (n === root ? " mindmap-hub" : "");
      if (n !== root) div.setAttribute("data-branch", String(n.branchIndex % COLOR_SLOTS));
      div.style.left = n.x + "px";
      div.style.top = n.y + "px";
      div.insertAdjacentHTML("afterbegin", inline(n.label));
      canvas.appendChild(div);
    });

    // Single DOM insertion — one reflow.
    while (container.firstChild) container.removeChild(container.firstChild);
    container.appendChild(canvas);
  }

  // ===== Main =====
  var el = document.getElementById("mindmap-root");
  var rawText = cleanupAnkiHtml(el.innerHTML);
  var title = el.getAttribute("data-title") || "(untitled)";
  var tree = parseTree(rawText, title);
  renderMindmap(tree, el);
})();
</script>
